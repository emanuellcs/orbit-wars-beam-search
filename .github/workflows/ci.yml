name: CI/CD

# Validate the native pybind11 engine, Python entrypoint, source packaging, and
# tagged release artifacts. The matrix mirrors supported local development
# interpreters so JIT and CMake builds stay aligned.
on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  # Cancel superseded builds for the same branch/tag to conserve CI minutes.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Read-only by default; release publishing grants write permissions locally.
  contents: read

env:
  # Exercise the optimized code path used by Kaggle submissions.
  CMAKE_BUILD_TYPE: Release

jobs:
  build-test:
    name: Build and test (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Keep the other Python version running if one matrix leg fails.
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        # requirements-dev.txt includes pybind11, pytest, Kaggle smoke deps, and
        # tuning dependencies used outside CI.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Configure CMake
        # Pin Python3_EXECUTABLE to the matrix interpreter so the extension ABI
        # matches the Python used by smoke tests.
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DPython3_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')"

      - name: Build C++ extension
        run: cmake --build build -j"$(nproc)"

      - name: Run smoke script
        # test.py can run as a script for quick native-entrypoint validation.
        run: PYTHONPATH=build python test.py

      - name: Run pytest suite
        # Pytest provides assertion rewriting and skips optional Kaggle tests
        # when kaggle_environments is unavailable.
        run: PYTHONPATH=build python -m pytest -q test.py

      - name: Verify Kaggle entrypoint imports
        # Exercise the exact agent(obs) shape Kaggle calls after importing main.py.
        run: |
          PYTHONPATH=build python - <<'PY'
          from types import SimpleNamespace
          from main import agent

          obs = SimpleNamespace(
              player=0,
              step=0,
              angular_velocity=0.0,
              planets=[
                  [0, 0, 10.0, 10.0, 2.0, 30, 2],
                  [1, -1, 25.0, 10.0, 2.0, 5, 3],
              ],
              fleets=[],
              initial_planets=[
                  [0, 0, 10.0, 10.0, 2.0, 30, 2],
                  [1, -1, 25.0, 10.0, 2.0, 5, 3],
              ],
              comets=[],
              comet_planet_ids=[],
          )
          actions = agent(obs)
          assert isinstance(actions, list)
          assert all(isinstance(row, list) and len(row) == 3 for row in actions)
          PY

      - name: Upload compiled extension artifact
        # Retain the built module and compile database for debugging CI failures.
        uses: actions/upload-artifact@v4
        with:
          name: orbit-engine-ubuntu-py${{ matrix.python-version }}
          path: |
            build/orbit_engine*.so
            build/compile_commands.json
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package source bundle
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create source package
        # This archive is for repository source distribution, not the Kaggle
        # submission bundle generated by package_submission.py.
        run: |
          mkdir -p dist
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -czf dist/orbit-wars-beam-search-source.tar.gz .

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: orbit-wars-beam-search-source
          path: dist/orbit-wars-beam-search-source.tar.gz
          if-no-files-found: error
          retention-days: 30

  release-artifacts:
    name: Publish tag artifacts
    runs-on: ubuntu-latest
    needs:
      - build-test
      - package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      # Tagged release publishing needs write access for gh release upload.
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List release artifacts
        run: find release-artifacts -maxdepth 3 -type f -print | sort

      - name: Create release bundle
        run: tar -czf "release-${GITHUB_REF_NAME}.tar.gz" -C release-artifacts .

      - name: Upload tagged artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release-${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}."
          fi
          gh release upload "${GITHUB_REF_NAME}" "release-${GITHUB_REF_NAME}.tar.gz" --clobber
